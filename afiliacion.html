<!DOCTYPE html>
<html lang="es">

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Afiliación - STM</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --stm-purple: #5A377B;
            --stm-light-purple: #f3f0f7;
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Roboto', sans-serif;
            padding: 20px;
        }

        .form-container {
            max-width: 700px;
            margin: 30px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-top: 8px solid var(--stm-purple);
        }

        .header-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-logo h2 {
            color: var(--stm-purple);
            font-weight: 700;
            margin-top: 15px;
        }

        .form-label {
            font-weight: bold;
            color: #444;
        }

        .btn-enviar {
            background-color: var(--stm-purple);
            border: none;
            padding: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-enviar:hover {
            background-color: #452a5e;
            transform: translateY(-2px);
            color: white;
        }

        .feedback-area {
            display: none;
            margin-top: 25px;
        }

        /* Simulación de carga */
        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 8px;
        }

        /* Estilos para el Modal Premium */
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            padding-bottom: 0;
        }

        .modal-title {
            color: var(--stm-purple);
            font-weight: 700;
        }

        #modalIcon {
            display: inline-block;
            margin-bottom: 1rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Footer Style */
        .footer {
            padding: 4rem 2rem;
            background: white;
            border-top: 1px solid #e2e8f0;
            margin-top: 5rem;
        }

        .footer-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            text-align: center;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .footer-logo img {
            height: 60px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 12px;
        }

        .footer-nav {
            display: flex;
            gap: 1.5rem;
            font-weight: 700;
            color: #64748b;
        }

        .footer-nav a {
            text-decoration: none;
            color: inherit;
            transition: color 0.3s;
        }

        .footer-nav a:hover {
            color: var(--stm-purple);
        }

        .footer-copy {
            color: #94a3b8;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <div class="header-logo">
            <!-- Espacio para el logo visual -->
            <img src="logo nuevo.png" alt="Logo STM" style="max-width: 150px; margin: 0 auto; display: block;">
            <h2>Sindicato de Trabajadores Municipales</h2>
            <p class="text-muted">Solicitud de Afiliación Digital</p>
        </div>

        <form id="afiliacionForm" class="needs-validation" novalidate>
            <div class="row g-3">
                <div class="col-md-12">
                    <label for="Nom_Ap" class="form-label">Nombre y Apellido Completo</label>
                    <input type="text" class="form-control" id="Nom_Ap" name="Nom_Ap" required
                        placeholder="Ej: Juan Carlos Pérez">
                </div>

                <div class="col-md-6">
                    <label for="DNI" class="form-label">DNI</label>
                    <input type="number" class="form-control" id="DNI" name="DNI" required placeholder="Sin puntos">
                </div>

                <div class="col-md-6">
                    <label for="Legajo" class="form-label">Nro de Legajo</label>
                    <input type="text" class="form-control" id="Legajo" name="Legajo" required placeholder="Sin barra">
                </div>

                <div class="col-md-6">
                    <label for="f_nac" class="form-label">Fecha de Nacimiento</label>
                    <input type="date" class="form-control" id="f_nac" name="f_nac" required max="">
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" name="email" required
                        placeholder="correo@ejemplo.com">
                </div>

                <div class="col-md-6">
                    <label for="telefono" class="form-label">Teléfono / WhatsApp</label>
                    <input type="text" class="form-control" id="telefono" name="telefono" required
                        placeholder="Ej: 2231234567">
                </div>

                <div class="col-md-6">
                    <label for="domicilio" class="form-label">Domicilio</label>
                    <input type="text" class="form-control" id="domicilio" name="domicilio" required
                        placeholder="Calle y Nro">
                </div>

                <div class="col-md-6">
                    <label for="est_civil" class="form-label">Estado Civil</label>
                    <select class="form-select" id="est_civil" name="est_civil" required>
                        <option value="" selected disabled>Seleccionar...</option>
                        <option value="Soltero/a">Soltero/a</option>
                        <option value="Casado/a">Casado/a</option>
                        <option value="Divorciado/a">Divorciado/a</option>
                        <option value="Viudo/a">Viudo/a</option>
                        <option value="Conviviente">Conviviente</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="nacionalidad" class="form-label">Nacionalidad</label>
                    <input type="text" class="form-control" id="nacionalidad" name="nacionalidad" required
                        value="Argentina">
                </div>

                <div class="col-md-12">
                    <hr>
                    <h5 style="color: var(--stm-purple);">Información Laboral</h5>
                </div>

                <div class="col-md-6">
                    <label for="ente_sec" class="form-label">Ente / Secretaría</label>
                    <input type="text" class="form-control" id="ente_sec" name="ente_sec" required>
                </div>

                <div class="col-md-6">
                    <label for="dependencia" class="form-label">Dependencia / Sector</label>
                    <input type="text" class="form-control" id="dependencia" name="dependencia" required>
                </div>

                <div class="col-md-6">
                    <label for="cargo" class="form-label">Cargo / Función</label>
                    <input type="text" class="form-control" id="cargo" name="cargo" required>
                </div>

                <div class="col-md-6">
                    <label for="planta" class="form-label">Tipo de Planta</label>
                    <select class="form-select" id="planta" name="planta" required>
                        <option value="" selected disabled>Seleccionar...</option>
                        <option value="Permanente">Permanente</option>
                        <option value="Temporaria">Temporaria</option>
                        <option value="Destajo">Destajo</option>
                    </select>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" id="btnEnviar" class="btn btn-enviar w-100">
                        Enviar Solicitud de Afiliación
                    </button>
                </div>
            </div>
        </form>

    </div>


    <!-- Modal para Mensajes de Feedback -->
    <div class="modal fade" id="resultModal" tabindex="-1" aria-labelledby="resultModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center pb-5 px-4">
                    <div id="modalIcon" style="font-size: 5rem;"></div>
                    <h3 class="modal-title mb-3" id="resultModalLabel"></h3>
                    <div id="resultModalMsg" class="fs-5 text-muted"></div>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" class="btn btn-enviar px-5 rounded-pill"
                        data-bs-dismiss="modal">Entendido</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // URL de tu Apps Script proporcionada por el usuario
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwhOyAXp1sZIamzS1Xz09rOE1QaFQTUx1SJiHkit_KW1eqZiKHV1GJNqEEgq6QX7kqaoQ/exec';

        (function () {
            'use strict'
            const form = document.getElementById('afiliacionForm');
            const btn = document.getElementById('btnEnviar');
            const fNacInput = document.getElementById('f_nac');

            // Establecer fecha máxima para nacimiento (hoy)
            fNacInput.max = new Date().toISOString().split("T")[0];
            const resultModal = new bootstrap.Modal(document.getElementById('resultModal'));
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('resultModalLabel');
            const modalMsg = document.getElementById('resultModalMsg');

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                if (!form.checkValidity()) {
                    event.stopPropagation();
                    form.classList.add('was-validated');
                    return;
                }

                // UI de carga
                btn.disabled = true;
                const originalText = btn.textContent;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Procesando Solicitud...';

                // Preparamos los datos
                const formData = new FormData(form);

                if (!formData.has('fecha_solicitud')) formData.append('fecha_solicitud', new Date().toISOString().split('T')[0]);
                if (!formData.has('EmailCopiaPDF')) formData.append('EmailCopiaPDF', formData.get('email'));

                const params = new URLSearchParams();
                for (const pair of formData.entries()) {
                    params.append(pair[0], pair[1]);
                }

                const emailUsuario = formData.get('email');
                const nombreUsuario = formData.get('Nom_Ap');

                try {
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: params,
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        }
                    });

                    // Mostrar éxito
                    setTimeout(() => {
                        form.reset();
                        form.classList.remove('was-validated');

                        modalIcon.innerHTML = `<img src="logo nuevo.png" alt="Logo" style="width: 120px; height: auto; margin-bottom: 20px;">`;
                        modalTitle.innerHTML = '¡Solicitud Procesada!';
                        modalMsg.innerHTML = `Estimado/a <strong>${nombreUsuario}</strong>, su solicitud ha sido enviada.<br><br>El sistema está generando su PDF. En unos instantes lo recibirá en:<br><strong>${emailUsuario}</strong><br><br><small class="text-muted fs-6">Revise su carpeta de SPAM si no lo ve en el buzón de entrada.</small>`;

                        resultModal.show();

                        btn.disabled = false;
                        btn.textContent = originalText;
                    }, 2000);

                } catch (error) {
                    console.error('Error:', error);
                    modalIcon.textContent = '❌';
                    modalTitle.textContent = 'Error de Conexión';
                    modalMsg.textContent = 'No pudimos conectar con el servidor. Por favor, intente nuevamente en unos minutos o contacte a soporte.';

                    resultModal.show();

                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            });
        })();
    </script>
</body>

</html>
