<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Disponibilidad Quincho - STM</title>
    <link rel="icon" type="image/png" href="logo nuevo.png">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --stm-primary: #4f46e5;
            --stm-accent: #f59e0b;
            --nav-bg: #111827;
            --text-dark: #1e293b;
            --glass: rgba(255, 255, 255, 0.85);
            --bg-body: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body.dark-mode {
            --stm-primary: #818cf8;
            --text-dark: #f1f5f9;
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(30, 41, 59, 0.85);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-body);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        header {
            padding: 40px 20px 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 14px;
            padding: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .welcome-msg h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .welcome-msg p {
            margin: 0;
            font-size: 1.05rem;
            opacity: 0.8;
            font-weight: 600;
            color: var(--stm-primary);
        }

        .container {
            padding: 24px 16px 140px;
            max-width: 600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* --- AVAILABILITY CARDS --- */
        .day-card {
            background: white;
            border-radius: 28px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            animation: fadeInUp 0.5s ease-out forwards;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            transition: all 0.3s ease;
        }

        .day-card:active {
            transform: scale(0.95);
        }

        body.dark-mode .day-card {
            background: #1e293b;
            border-color: #334155;
        }

        .day-ico {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: #f0fdf4;
            color: #16a34a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        body.dark-mode .day-ico {
            background: #064e3b;
            color: #34d399;
        }

        .day-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .day-title {
            font-size: 1rem;
            font-weight: 800;
            margin: 0;
            color: #334155;
            line-height: 1.2;
        }

        body.dark-mode .day-title {
            color: white;
        }

        .day-subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-badge {
            background: #f0fdf4;
            color: #16a34a;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .status-badge.libre {
            animation: status-blink 1.5s infinite ease-in-out;
        }

        @keyframes status-blink {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.95);
            }
        }

        /* --- OCCUPIED STATE --- */
        .day-card.occupied {
            background: #fff1f2;
            border-bottom: 6px solid #ef4444;
            cursor: default;
        }

        body.dark-mode .day-card.occupied {
            background: #451a1a;
            border-color: #ef4444;
        }

        .day-card.occupied .day-ico {
            background: #fee2e2;
            color: #ef4444;
        }

        body.dark-mode .day-card.occupied .day-ico {
            background: #7f1d1d;
            color: #f87171;
        }

        .day-card.occupied .status-badge {
            background: #ef4444;
            color: white;
        }

        /* --- MY BOOKING STATE --- */
        .day-card.my-booking {
            background: #eef2ff;
            border-bottom: 6px solid var(--stm-primary);
            cursor: pointer;
        }

        body.dark-mode .day-card.my-booking {
            background: #1e1b4b;
            border-color: var(--stm-primary);
        }

        .day-card.my-booking .day-ico {
            background: #e0e7ff;
            color: var(--stm-primary);
        }

        body.dark-mode .day-card.my-booking .day-ico {
            background: #312e81;
            color: #818cf8;
        }

        .day-card.my-booking .status-badge {
            background: var(--stm-primary);
            color: white;
            animation: status-blink 1.5s infinite ease-in-out;
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--stm-primary) 0%, #6366f1 100%);
            color: white;
            border-radius: 20px;
            padding: 16px;
            font-weight: 800;
            border: none;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }

        .btn-confirm:active {
            transform: scale(0.94) translateY(2px);
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
        }

        .btn-danger-outline {
            border: 2px solid #ef4444;
            color: #ef4444;
            background: white;
            border-radius: 20px;
            padding: 16px;
            font-weight: 800;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.05rem;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.1);
        }

        body.dark-mode .btn-danger-outline {
            background: transparent;
        }

        .btn-danger-outline:active {
            transform: scale(0.94) translateY(2px);
            background: #fef2f2;
        }

        body.dark-mode .btn-danger-outline:active {
            background: rgba(239, 68, 68, 0.1);
        }

        .footer-action-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            padding-top: 10px;
        }

        /* --- BOT & NAV --- */
        /* --- FAB BOT CONTAINER --- */
        .fab-bot-container {
            position: relative;
            width: 60px;
            height: 60px;
            animation: botBreathe 3s infinite ease-in-out;
        }

        /* --- FAB BOT (Estilo Banco Provincia) --- */
        .fab-bot {
            width: 60px;
            height: 60px;
            background: transparent !important;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: none;
            transition: transform 0.3s;
            position: relative;
            z-index: 2;
        }

        .fab-bot:active {
            transform: scale(0.9);
        }

        .fab-bot img {
            width: 130%;
            height: 130%;
            object-fit: cover;
        }

        /* Pulse rings */
        .fab-bot-pulse {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 14px;
            border: 2.5px solid rgba(99, 102, 241, 0.5);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            animation: pulseRing 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            pointer-events: none;
            z-index: 1;
        }

        .fab-bot-pulse:nth-child(2) {
            animation-delay: 0.8s;
        }

        .fab-bot-pulse:nth-child(3) {
            animation-delay: 1.6s;
        }

        @keyframes pulseRing {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.7;
            }

            100% {
                transform: translate(-50%, -50%) scale(2.2);
                opacity: 0;
            }
        }

        @keyframes botBreathe {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes bounceBot {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .nav-home-pulse i {
            animation: home-blink 3s infinite ease-in-out;
        }

        @keyframes home-blink {

            0%,
            100% {
                color: #64748b;
                transform: scale(1);
            }

            50% {
                color: white;
                transform: scale(1.1);
            }
        }

        .bot-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .bot-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .bot-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: white;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 30px 20px 40px;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .bot-modal.active .bot-content {
            transform: translateY(0);
        }

        body.dark-mode .bot-content {
            background: #1e293b;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* SweetAlert Customization */
        .swal2-popup {
            border-radius: 35px !important;
            padding: 2rem !important;
            font-family: 'Outfit', sans-serif !important;
        }

        .swal2-title {
            font-weight: 800 !important;
            font-size: 1.5rem !important;
            color: var(--text-dark) !important;
        }

        body.dark-mode .swal2-title {
            color: #f1f5f9 !important;
        }

        .swal2-html-container {
            font-size: 1rem !important;
            color: #64748b !important;
        }

        .swal2-confirm {
            border-radius: 20px !important;
            padding: 15px 30px !important;
            font-weight: 800 !important;
            width: 100% !important;
            background-color: var(--stm-primary) !important;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3) !important;
        }

        .bottom-nav {
            position: fixed;
            bottom: 25px;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 25px);
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 380px;
            height: 72px;
            background: rgba(17, 24, 39, 0.95) !important;
            backdrop-filter: blur(10px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 1040;
            padding: 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-btn {
            text-decoration: none;
            color: #64748b;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn:active {
            transform: scale(0.9);
        }

        .nav-btn.active {
            color: white;
            background: var(--stm-primary);
            border-radius: 50%;
            transform: translateY(-12px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
        }

        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        body.dark-mode #loader-wrapper {
            background: #0f172a;
        }

        .loader-logo {
            width: 100px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bot-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border-radius: 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
        }

        body.dark-mode .bot-input {
            background: #0f172a;
            border-color: #334155;
            color: #f1f5f9;
        }
    </style>
</head>

    <script>
        // URL DE DASHBOARD
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwWKS8Nbx8-TFJMmsXV6nQXs6Jinvh5TdVRom7v7aTIvsTC_RRXYoPq9_lN5IeItzCBZg/exec";

        function qFormatDate(date) {
            const d = qParseDate(date);
            if (isNaN(d.getTime())) return "";
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function qFormatSheetDate(date) {
            const d = qParseDate(date);
            if (isNaN(d.getTime())) return "";
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}/${d.getFullYear()}`;
        }

        function qParseDate(val) {
            if (!val) return new Date(NaN);
            if (val instanceof Date) return val;
            const s = val.toString().trim();
            // 1. Intentar DD/MM/YYYY
            const p1 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
            if (p1) return new Date(parseInt(p1[3]), parseInt(p1[2]) - 1, parseInt(p1[1]));
            // 2. Intentar YYYY-MM-DD
            const p2 = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
            if (p2) return new Date(parseInt(p2[1]), parseInt(p2[2]) - 1, parseInt(p2[3]));

            return new Date(s);
        }

        async function loadAvailableDays() {
            let config = {};
            const loader = document.getElementById('loader-wrapper');
            loader.style.display = 'flex';
            loader.style.opacity = '1';

            const urlParams = new URLSearchParams(window.location.search);
            const userSede = (urlParams.get('sede') || 'Sede').toLowerCase();

            try {
                if (URL_SCRIPT) {
                    const myUserId = localStorage.getItem('usrID') || "";
                    const params = new URLSearchParams({
                        sections: 'FECHAS_QUINCHO,SOLICITUD_QUINCHO',
                        userId: myUserId,
                        skipClean: 'true',
                        _: Date.now()
                    });
                    const res = await fetch(`${URL_SCRIPT}?${params.toString()}`);
                    const data = await res.json();

                    if (data.FECHAS_QUINCHO) {
                        data.FECHAS_QUINCHO.forEach(row => {
                            if (!row.fecha) return;
                            let rowLugar = (row.Lugar || row.lugar || 'Sede').toString().toLowerCase();
                            if (rowLugar !== userSede) return;

                            const iso = qFormatDate(row.fecha);
                            config[iso] = {
                                enabled: true,
                                occupied: ((row.estado || "").toString().trim().toUpperCase() === 'OCUPADO' ? 1 : 0),
                                backend_id: row.id
                            };
                        });
                    }

                    // Verificar si el usuario ya tiene reservas activas
                    if (data.SOLICITUD_QUINCHO) {
                        const myUserId = localStorage.getItem('usrID');
                        const myRequests = data.SOLICITUD_QUINCHO.filter(s => {
                            return s.id_user && s.id_user.toString() === myUserId.toString() &&
                                (s.pendiente.toString().toUpperCase() === 'SI' || (s.pendiente.toString().toUpperCase() === 'NO' && qFormatDate(s.fecha_solicitada) >= qFormatDate(new Date())));
                        });

                        if (myRequests.length > 0) {
                            const activeBookings = myRequests.map(myRequest => {
                                const isPending = myRequest.pendiente.toString().toUpperCase() === 'SI';
                                const isoBooked = qFormatDate(myRequest.fecha_solicitada);

                                // BÚSQUEDA GLOBAL DEL DATE_ID
                                const dateRecord = data.FECHAS_QUINCHO.find(f => qFormatDate(f.fecha) === isoBooked && (f.Lugar || f.lugar || "Sede").toString().toUpperCase() === (myRequest.Lugar || myRequest.lugar || "Sede").toString().toUpperCase());
                                const dateId = dateRecord ? dateRecord.id : null;
                                const solLugar = (myRequest.Lugar || myRequest.lugar || 'Sede').toString().toUpperCase();

                                return {
                                    id: myRequest.id,
                                    iso: isoBooked,
                                    date: qFormatSheetDate(myRequest.fecha_solicitada),
                                    status: isPending ? 'PENDIENTE' : 'CONFIRMADA',
                                    date_id: dateId,
                                    lugar: solLugar
                                };
                            });

                            localStorage.setItem('my_active_bookings', JSON.stringify(activeBookings));

                        } else {
                            localStorage.removeItem('my_active_bookings');
                        }
                    }
                }
            } catch (e) {
                console.error("Error cargando disponibilidad:", e);
                config = JSON.parse(localStorage.getItem('stm_quincho_config')) || {};
            }
            renderList(config);
        }

        function renderList(config) {
            const listDiv = document.getElementById('daysList');
            const emptyMsg = document.getElementById('emptyMsg');
            listDiv.innerHTML = '';

            const todayStr = qFormatDate(new Date());

            let found = false;
            const sortedDates = Object.keys(config).sort();

            sortedDates.forEach((iso, index) => {
                const dateObj = qParseDate(iso);
                const isoNormalized = qFormatDate(dateObj);

                // Mostrar solo fechas futuras o hoy que estén habilitadas
                if (isoNormalized >= todayStr && config[iso].enabled) {
                    found = true;
                    const isOccupied = config[iso].occupied === 1;
                    const dayNames = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
                    const name = dayNames[dateObj.getDay()];
                    const dateFormatted = qFormatSheetDate(dateObj);

                    const activeBookingsStr = localStorage.getItem('my_active_bookings');
                    let isMyBooking = false;
                    if (activeBookingsStr) {
                        const activeBookings = JSON.parse(activeBookingsStr);
                        const userSede = (new URLSearchParams(window.location.search).get('sede') || 'Sede').toUpperCase();
                        isMyBooking = activeBookings.some(b => b.iso === isoNormalized && (b.lugar || 'SEDE') === userSede);
                    }

                    const card = document.createElement('div');
                    card.className = `day-card ${isMyBooking ? 'my-booking' : (isOccupied ? 'occupied' : '')}`;
                    card.style.animationDelay = `${index * 0.05}s`;

                    if (!isOccupied || isMyBooking) {
                        card.onclick = () => handleDaySelection(iso, name, dateFormatted, config[iso].backend_id, isMyBooking);
                    }

                    card.innerHTML = `
                        <div class="day-ico"><i class="fa-solid ${isMyBooking ? 'fa-calendar-check' : (isOccupied ? 'fa-calendar-xmark' : 'fa-calendar-check')}"></i></div>
                        <div class="day-info">
                            <div class="day-subtitle">${name}</div>
                            <h3 class="day-title">${dateFormatted}</h3>
                        </div>
                        <span class="status-badge ${isMyBooking || !isOccupied ? 'libre' : ''}">${isMyBooking ? 'MI RESERVA' : (isOccupied ? 'OCUPADO' : 'LIBRE')}</span>
                    `;
                    listDiv.appendChild(card);
                }
            });

            if (!found) emptyMsg.style.display = 'block';
            else emptyMsg.style.display = 'none';

            const loader = document.getElementById('loader-wrapper');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }

        function handleDaySelection(iso, name, date, backendId, isMyBooking = false) {
            const activeBookingsStr = localStorage.getItem('my_active_bookings');
            const title = document.getElementById('modalActionTitle');
            const body = document.getElementById('modalActionBody');
            const footer = document.getElementById('modalActionFooter');
            const iconContainer = document.getElementById('modalActionIconContainer');
            const icon = document.getElementById('modalActionIcon');

            let activeBookings = [];
            if (activeBookingsStr) {
                activeBookings = JSON.parse(activeBookingsStr);
            }

            const userSede = (new URLSearchParams(window.location.search).get('sede') || 'Sede').toUpperCase();
            const myBookingForThisDay = activeBookings.find(b => b.iso === iso && (b.lugar || 'SEDE') === userSede);

            if (myBookingForThisDay || isMyBooking) {
                const b = myBookingForThisDay || activeBookings[0];
                const isPending = b.status === 'PENDIENTE';

                title.innerText = isPending ? "¡Reserva Pendiente!" : "¡Reserva Confirmada!";

                if (isPending) {
                    iconContainer.style.background = 'rgba(79, 70, 229, 0.1)';
                    icon.className = 'fa-solid fa-calendar-check';
                    icon.style.color = 'var(--stm-primary)';
                } else {
                    iconContainer.style.background = 'rgba(16, 185, 129, 0.1)';
                    icon.className = 'fa-solid fa-circle-check';
                    icon.style.color = '#10b981';
                }

                const alertHtml = isPending ? `
                    <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
                        <div class="animate__animated animate__pulse animate__infinite" 
                             style="display: flex; align-items: center; justify-content: center; width: 80px; height: 80px; font-size: 4rem; color: #f59e0b;">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>
                    </div>` : '';

                body.innerHTML = alertHtml + `
                    <div style="text-align: center;">
                        <p class="text-muted small">Detalles de tu reserva actual.</p>
                    </div>
                    <p style="font-size: 1.1rem; color: var(--text-dark);">Ya tenés una reserva <b>${isPending ? 'PENDIENTE' : 'CONFIRMADA'}</b> para el día <b>${b.date}</b> para el lugar <b>${b.lugar || 'SEDE'}</b>. Para finalizar este trámite debés acercarte a la Secretaría de Acción Social en el 2do.piso de la Sede del STM de lunes a viernes de 8:30 a 12hs y de 17 a 19:30hs <b>hasta 5 días hábiles antes del evento</b> para efectivizar pago y completar documentación requerida.</p>
                `;

                footer.innerHTML = `
                    <div class="footer-action-buttons">
                        <button class="btn-confirm" onclick="toggleAction(false)">
                            <i class="fa-solid fa-shield-halved fs-5"></i> MANTENER RESERVA
                        </button>
                        <button class="btn-danger-outline" onclick="cancelMyBooking('${b.id}', '${b.date_id}')">
                            <i class="fa-solid fa-triangle-exclamation fs-5"></i> ANULAR RESERVA
                        </button>
                    </div>
                `;
            } else {
                title.innerText = "Confirmar Solicitud";
                if (iconContainer && icon) {
                    iconContainer.style.background = 'rgba(79, 70, 229, 0.1)';
                    icon.className = 'fa-solid fa-calendar-check';
                    icon.style.color = 'var(--stm-primary)';
                }

                body.innerHTML = `<p class="text-center" style="font-size: 1.1rem;">¿Deseas confirmar tu reserva para el quincho el día <b>${name} ${date}</b>?</p>`;
                footer.innerHTML = `
                    <div class="footer-action-buttons">
                        <button class="btn-confirm" onclick="confirmMyBooking('${iso}', '${date}', '${backendId}')">
                            <i class="fa-solid fa-calendar-check fs-5"></i> CONFIRMAR RESERVA
                        </button>
                    </div>
                `;
            }
            toggleAction(true);
        }

        async function confirmMyBooking(iso, date, backendId) {
            const userId = localStorage.getItem('usrID');
            const fullName = localStorage.getItem('usrFullName') || "";
            const parts = fullName.split(' ');
            const nombre = parts[0] || "";
            const apellido = parts.slice(1).join(' ') || "";

            const urlParams = new URLSearchParams(window.location.search);
            const userSede = urlParams.get('sede') || 'Sede';

            Swal.fire({
                title: 'Procesando reserva...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const payload = {
                    id_user: userId,
                    Nombre: nombre,
                    nombre: nombre,
                    Apellido: apellido,
                    apellido: apellido,
                    telefono: localStorage.getItem('usrTelefono') || "",
                    fecha_solicitada: date,
                    fecha_actual: qFormatSheetDate(new Date()),
                    lugar: userSede,
                    pendiente: 'NO'
                };

                const res = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'CREATE',
                        sheet: 'SOLICITUD_QUINCHO',
                        data: payload
                    })
                });

                const result = await res.json();

                if (result.status === 'SUCCESS') {
                    // Actualizar estado de la fecha a OCUPADO en FECHAS_QUINCHO
                    if (backendId) {
                        await fetch(URL_SCRIPT, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'UPDATE',
                                sheet: 'FECHAS_QUINCHO',
                                id: backendId,
                                data: { estado: 'OCUPADO' }
                            })
                        });
                    }

                    // Enviar notificación persistente al usuario
                    await fetch(URL_SCRIPT, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'CREATE',
                            sheet: 'MENSAJES',
                            data: {
                                id_user: userId,
                                titulo: "Reserva de Quincho Recibida",
                                mensaje: "Su trámite de reserva para el quincho ha sido recibido y confirmado. Para finalizar este trámite debe acercarse a la Secretaría de Acción Social en el 2do.piso de la Sede del STM de lunes a viernes de 8:30 a 12hs y de 17 a 19:30hs hasta 5 días hábiles antes del evento para efectibizar pago y completar documentación requerida",
                                fecha: new Date().toLocaleString()
                            }
                        })
                    });

                    toggleAction(false);
                    Swal.fire({
                        icon: 'success',
                        title: '¡Reserva Solicitada!',
                        text: 'Tu reserva para el quincho ha sido procesada con éxito. Para finalizar este trámite debe que acercarse a la Secretaría de Acción Social en el 2do.piso de la Sede del STM de lunes a viernes de 8:30 a 12hs y de 17 a 19:30hs hasta 5 días hábiles antes del evento.',
                        confirmButtonColor: 'var(--stm-primary)'
                    });
                    loadAvailableDays();
                } else {
                    throw new Error(result.message || 'Error desconocido');
                }

            } catch (e) {
                console.error("Error confirmando reserva:", e);
                Swal.fire('Error', 'No se pudo enviar la solicitud. Intente nuevamente.', 'error');
            }
        }

        async function cancelMyBooking(idSolicitud, dateId) {
            const userId = localStorage.getItem('usrID');
            const activeBookings = JSON.parse(localStorage.getItem('my_active_bookings') || '[]');
            const b = activeBookings.find(x => x.id === idSolicitud) || {};
            const finalDateId = dateId || b.date_id;

            Swal.fire({
                title: 'Anulando solicitud...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const res = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'CANCEL_QUINCHO',
                        bookingId: idSolicitud,
                        dateId: finalDateId, // ID de la fecha para liberar
                        userId: userId
                    })
                });

                const result = await res.json();

                if (result.status === 'SUCCESS') {
                    // Enviar mensaje de anulación al usuario
                    if (userId && userId != 0) {
                        await fetch(URL_SCRIPT, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'CREATE',
                                sheet: 'MENSAJES',
                                data: {
                                    id_user: userId,
                                    titulo: "Reserva Anulada",
                                    mensaje: `Su reserva para el día ${b.date || ''} ha sido anulada exitosamente. Deberá volver a solicitar la reserva nuevamente si así lo desea.`,
                                    fecha: new Date().toLocaleString()
                                }
                            })
                        });
                    }

                    const updatedBookings = activeBookings.filter(x => x.id !== idSolicitud);
                    if (updatedBookings.length > 0) {
                        localStorage.setItem('my_active_bookings', JSON.stringify(updatedBookings));
                    } else {
                        localStorage.removeItem('my_active_bookings');
                    }
                    toggleAction(false);
                    Swal.fire({
                        icon: 'success',
                        title: 'Gestión Anulada',
                        text: 'Tu solicitud ha sido eliminada correctamente.',
                        confirmButtonColor: 'var(--stm-primary)'
                    });
                    loadAvailableDays();
                } else {
                    throw new Error(result.message || 'Error al anular');
                }
            } catch (e) {
                console.error("Error anulando reserva:", e);
                Swal.fire('Error', 'No se pudo anular la solicitud. Intente nuevamente.', 'error');
            }
        }

        document.getElementById('botSearch').addEventListener('input', (e) => {
            const val = normalize(e.target.value).trim();
            const res = document.getElementById('botRes');
            if (searchTimer) clearTimeout(searchTimer);
            if (val.length <= 2) { res.innerHTML = ""; return; }
            res.innerHTML = `<div style="padding:20px; text-align:center; color:#94a3b8; font-size:0.85rem;" class="animate__animated animate__pulse animate__infinite">Buscando en el STM...</div>`;
            searchTimer = setTimeout(() => {
                res.innerHTML = "";
                const words = val.split(" ").filter(w => w.length > 2);
                sitePages.filter(p => {
                    const target = normalize(p.t + " " + p.tags);
                    return words.some(w => target.includes(w)) || target.includes(val);
                }).forEach(p => {
                    res.innerHTML += `<a href="${p.f}" class="res-item-bot" style="display:flex; align-items:center; gap:12px; padding:12px; border-radius:15px; margin-bottom:8px; text-decoration:none; color:inherit; display:block">
                        <div style="display:flex; align-items:center; gap:10px">
                            <div style="width:30px; height:30px; border-radius:8px; background:var(--stm-primary); color:white; display:flex; align-items:center; justify-content:center; font-size:0.8rem"><i class="fa-solid ${p.ico}"></i></div>
                            <div><h4 style="margin:0; font-size:0.85rem">${p.t}</h4><p style="margin:0; font-size:0.7rem; opacity:0.7">${p.d}</p></div>
                        </div>
                    </a>`;
                });
            }, 500);
        });

        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userSede = urlParams.get('sede') || 'Sede';
            document.title = "Disponibilidad Quincho - " + userSede.toUpperCase();

            loadAvailableDays();
            const cfg = { dark: localStorage.getItem('cfg_dark') === 'true', bot: localStorage.getItem('cfg_bot') !== 'false' };
            document.body.classList.toggle('dark-mode', cfg.dark);
            if (document.getElementById('checkDark')) document.getElementById('checkDark').checked = cfg.dark;
            if (document.getElementById('checkBot')) document.getElementById('checkBot').checked = cfg.bot;
            if (document.getElementById('fabBotIcon')) document.getElementById('fabBotIcon').classList.toggle('hidden', !cfg.bot);

            const savedName = localStorage.getItem('usrName') || "Afiliado STM";
            document.getElementById('usrDisplayName').innerText = savedName;
            const h = new Date().getHours();
            const greet = h < 12 ? "¡Buen día!" : h < 20 ? "¡Buenas tardes!" : "¡Buenas noches!";
            if (document.getElementById('usrGreeting')) document.getElementById('usrGreeting').innerText = greet;
        });
    </script>
    <script src="stm-bot.js"></script>
</body>

</html>
